name: Build Linux HostFXR(.NET 10+)

on:
  workflow_dispatch:

jobs:
  linux-x64:
    name: Build linux-x64 Artifacts
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Patcher
      - run: |
            git clone https://github.com/dotnet/runtime.git
            cp -r ./HostFXRPatcher/ ./runtime/HostFXRPatcher
            docker run --rm -v ~/work/HostFXRPatcher/HostFXRPatcher/runtime:/runtime -w /runtime -e ROOTFS_DIR=/crossrootfs/x64/ mcr.microsoft.com/dotnet-buildtools/prereqs:azurelinux-3.0-net10.0-cross-amd64 bash -c 'git config --global --add safe.directory /runtime ; cd HostFXRPatcher ; pwsh updateVersionReleases.ps1 ; ROOTFS_DIR=/crossrootfs/x64 pwsh ./buildPatch.ps1 -rid linux-x64 -configuration Release -versions ${{ vars.VERSIONS }} -portable -stripsymbols -cross'
      - uses: actions/upload-artifact@v4
        with:
          name: patched-hostfxr_linux-x64
          path: runtime/artifacts-patched

  linux-arm:
    name: Build linux-arm Artifacts
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Patcher
      - run: |
            git clone https://github.com/dotnet/runtime.git
            cp -r ./HostFXRPatcher/ ./runtime/HostFXRPatcher
            docker run --rm -v ~/work/HostFXRPatcher/HostFXRPatcher/runtime:/runtime -w /runtime -e ROOTFS_DIR=/crossrootfs/arm/ mcr.microsoft.com/dotnet-buildtools/prereqs:azurelinux-3.0-net10.0-cross-arm bash -c 'git config --global --add safe.directory /runtime ; cd HostFXRPatcher ; pwsh updateVersionReleases.ps1 ; ROOTFS_DIR=/crossrootfs/arm pwsh ./buildPatch.ps1 -rid linux-arm -configuration Release -versions ${{ vars.VERSIONS }} -portable -stripsymbols -cross'
      - uses: actions/upload-artifact@v4
        with:
          name: patched-hostfxr_linux-arm
          path: runtime/artifacts-patched

  linux-arm64:
    name: Build linux-arm64 Artifacts
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Patcher
      - run: |
            git clone https://github.com/dotnet/runtime.git
            cp -r ./HostFXRPatcher/ ./runtime/HostFXRPatcher
            docker run --rm -v ~/work/HostFXRPatcher/HostFXRPatcher/runtime:/runtime -w /runtime -e ROOTFS_DIR=/crossrootfs/arm64/ mcr.microsoft.com/dotnet-buildtools/prereqs:azurelinux-3.0-net10.0-cross-arm64 bash -c 'git config --global --add safe.directory /runtime ; cd HostFXRPatcher ; pwsh updateVersionReleases.ps1 ; ROOTFS_DIR=/crossrootfs/arm64 pwsh ./buildPatch.ps1 -rid linux-arm64 -configuration Release -versions ${{ vars.VERSIONS }} -portable -stripsymbols -cross'
      - uses: actions/upload-artifact@v4
        with:
          name: patched-hostfxr_linux-arm64
          path: runtime/artifacts-patched
